services:
  ollama:
    # Pinned to a stable Ollama release. Bump explicitly after testing — never
    # use :latest in production (rollback story disappears).
    image: ollama/ollama:0.5.4
    container_name: regpilot-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      # See docs.ollama.com/faq — these env vars are the production-tuning
      # knobs. NUM_PARALLEL=1 + single-threaded embedding makes Ollama
      # CPU-deterministic so eval scores reproduce across fresh container
      # boots (the trade-off vs. NUM_PARALLEL=4 is throughput, not quality).
      OLLAMA_NUM_PARALLEL: "1"          # serialise inference for determinism
      OLLAMA_MAX_QUEUE: "256"           # plenty of headroom since calls are serial
      OLLAMA_MAX_LOADED_MODELS: "2"     # chat + embed simultaneously
      OLLAMA_KEEP_ALIVE: "30m"          # keep models warm across the eval run
      OLLAMA_FLASH_ATTENTION: "1"       # ~10-20% throughput gain when supported
      OLLAMA_DEBUG: "0"
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30

  ingest:
    build:
      context: .
    container_name: regpilot-ingest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      REGPILOT_LLM: ollama
      OLLAMA_BASE_URL: http://ollama:11434
      REGPILOT_CHAT_MODEL: qwen2.5:3b-instruct
      REGPILOT_EMBED_MODEL: nomic-embed-text
      REGPILOT_CHROMA_DIR: /data/chroma
      REGPILOT_DATA_DIR: /data/raw
    volumes:
      - chroma:/data/chroma
      - data:/data/raw
    entrypoint: ["/usr/local/bin/entrypoint-ingest.sh"]
    restart: "no"

  app:
    build:
      context: .
    container_name: regpilot-app
    depends_on:
      ollama:
        condition: service_healthy
      ingest:
        condition: service_completed_successfully
    environment:
      # Provider — change to "openai" or "anthropic" and pass the matching
      # API key env vars to use a hosted LLM (faster, much better quality).
      REGPILOT_LLM: ${REGPILOT_LLM:-ollama}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-3-5-haiku-latest}
      # Ollama is always wired in — for the default local backend and as the
      # embedding provider when REGPILOT_LLM=anthropic.
      OLLAMA_BASE_URL: http://ollama:11434
      # 240 s timeout per call so synthesizer / rerank under load never falls
      # back to the template path mid-eval (template fallback would jitter the
      # scores across runs). Trade speed for determinism on the CPU eval path.
      OLLAMA_TIMEOUT_S: "240"
      REGPILOT_CHAT_MODEL: qwen2.5:3b-instruct
      REGPILOT_EMBED_MODEL: nomic-embed-text
      REGPILOT_EMBED_PARALLELISM: "1"   # serialise embedding for CPU-determinism
      REGPILOT_CHROMA_DIR: /data/chroma
      REGPILOT_DATA_DIR: /data/raw
      # LLM-primary mode (Option C). The LLM drives intake, classification,
      # rerank, synthesizer via structured outputs. Set any flag to "true"
      # to fall back to the deterministic regex/template path for that node.
      REGPILOT_INTAKE_FAST: "false"
      REGPILOT_RERANK_FAST: "false"
      REGPILOT_SYNTH_FAST: "false"
      REGPILOT_SEM_THRESHOLD: "0.45"
      # Durable LangGraph state across container restarts (single-process
      # SqliteSaver; switch to PostgresSaver when going multi-worker).
      REGPILOT_CHECKPOINTER: sqlite
      REGPILOT_CHECKPOINT_PATH: /data/checkpoints.sqlite
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    volumes:
      - chroma:/data/chroma
      - data:/data/raw

volumes:
  ollama-models:
  chroma:
  data:
